<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0a0c11" />
  <meta name="description" content="Guias da guild Wanted — Tank, DPS e Healer para GvG." />
  <title>Wanted · Guias</title>
  <style>
    :root{
      --bg:#0a0c11;
      --card:rgba(255,255,255,.035);
      --card-line:rgba(255,255,255,.09);
      --text:#eef1f7;
      --muted:#96a0b5;
      --tank-a:#3b82f6; --tank-b:#38bdf8;
      --dps-a:#ff6a2b; --dps-b:#ffb038;
      --heal-a:#26d47f; --heal-b:#37c6c0;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:
        radial-gradient(900px 480px at 50% -8%, rgba(120,140,255,.20), transparent 68%),
        radial-gradient(700px 500px at 50% 120%, rgba(38,120,120,.12), transparent 70%),
        var(--bg);
      color:var(--text);
      min-height:100dvh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:40px 20px;line-height:1.55;-webkit-font-smoothing:antialiased;
    }
    .wrap{width:100%;max-width:460px;text-align:center;}

    /* emblema */
    .crest{
      width:76px;height:76px;margin:0 auto 22px;
      border-radius:20px;display:grid;place-items:center;
      background:linear-gradient(160deg,rgba(142,162,255,.18),rgba(255,255,255,.03));
      border:1px solid rgba(142,162,255,.35);
      box-shadow:0 0 0 6px rgba(120,140,255,.06),0 18px 40px -20px rgba(120,140,255,.6);
    }
    .crest span{
      font-size:34px;font-weight:800;letter-spacing:.02em;
      background:linear-gradient(120deg,#aeb9ff,#e7ecff);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }

    .kicker{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:#7f89a1;margin-bottom:8px;}
    h1{
      font-size:clamp(2.6rem,11vw,3.6rem);line-height:1;letter-spacing:.01em;font-weight:800;
      background:linear-gradient(120deg,#8ea2ff,#d6ddff);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    .sub{color:var(--muted);margin:14px 0 34px;font-size:1.02rem;}

    .guides{display:grid;gap:14px;}
    a.guide{
      position:relative;display:flex;align-items:center;gap:16px;
      text-decoration:none;text-align:left;color:var(--text);
      background:var(--card);border:1px solid var(--card-line);border-radius:18px;
      padding:18px 18px;overflow:hidden;
      transition:transform .16s ease,border-color .16s ease,background .16s ease;
    }
    a.guide::before{ /* faixa de cor da função */
      content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px;
    }
    a.guide.tank::before{background:linear-gradient(var(--tank-a),var(--tank-b));}
    a.guide.dps::before{background:linear-gradient(var(--dps-a),var(--dps-b));}
    a.guide.heal::before{background:linear-gradient(var(--heal-a),var(--heal-b));}
    a.guide:active{transform:scale(.985);}
    @media(hover:hover){
      a.guide:hover{transform:translateY(-2px);background:rgba(255,255,255,.06);}
      a.guide.tank:hover{border-color:rgba(70,150,255,.55);}
      a.guide.dps:hover{border-color:rgba(255,140,60,.55);}
      a.guide.heal:hover{border-color:rgba(45,210,130,.55);}
    }

    .ico{
      width:52px;height:52px;flex:none;border-radius:14px;
      display:grid;place-items:center;
    }
    .ico svg{width:26px;height:26px;}
    .ico.tank{background:linear-gradient(150deg,var(--tank-a),var(--tank-b));box-shadow:0 10px 26px -12px rgba(60,140,255,.8);}
    .ico.dps{background:linear-gradient(150deg,var(--dps-a),var(--dps-b));box-shadow:0 10px 26px -12px rgba(255,120,50,.8);}
    .ico.heal{background:linear-gradient(150deg,var(--heal-a),var(--heal-b));box-shadow:0 10px 26px -12px rgba(45,210,140,.8);}
    .ico.tank svg{stroke:#06122b;fill:#06122b;} .ico.dps svg{stroke:#2a1206;} .ico.heal svg{stroke:#04231a;fill:#04231a;}

    .txt{min-width:0;flex:1;}
    .txt .t{font-size:1.16rem;font-weight:750;letter-spacing:.01em;}
    .txt .d{font-size:.9rem;color:var(--muted);margin-top:2px;}
    .role{
      font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
      margin-bottom:3px;
    }
    .tank .role{color:#6fb2ff;} .dps .role{color:#ff9d5c;} .heal .role{color:#4fe0a0;}
    .arrow{margin-left:6px;flex:none;color:#7f89a1;transition:transform .16s ease;}
    @media(hover:hover){a.guide:hover .arrow{transform:translateX(3px);color:var(--text);}}

    footer{margin-top:34px;font-size:12.5px;letter-spacing:.04em;color:#616b81;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="crest"><span>W</span></div>
    <div class="kicker">Guild</div>
    <h1>Wanted</h1>
    <p class="sub">Guias de GvG — escolha sua função.</p>

    <div class="guides">
      <a class="guide tank" href="./tank/">
        <span class="ico tank">
          <!-- escudo -->
          <svg viewBox="0 0 24 24" stroke-width="0">
            <path d="M12 2l7 3v6c0 4.6-3.1 8.4-7 9.9C8.1 19.4 5 15.6 5 11V5l7-3z"/>
          </svg>
        </span>
        <span class="txt">
          <span class="role">Tank</span>
          <div class="t">Guia do Tank</div>
          <div class="d">Build, frontline, controle e resistência</div>
        </span>
        <span class="arrow">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </span>
      </a>

      <a class="guide dps" href="./dps/">
        <span class="ico dps">
          <!-- espada -->
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/>
            <line x1="13" y1="19" x2="19" y2="13"/>
            <line x1="16" y1="16" x2="20" y2="20"/>
          </svg>
        </span>
        <span class="txt">
          <span class="role">DPS</span>
          <div class="t">Guia do DPS</div>
          <div class="d">Build, kit, decisão e dano no GvG</div>
        </span>
        <span class="arrow">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </span>
      </a>

      <a class="guide heal" href="./healer/">
        <span class="ico heal">
          <!-- coração -->
          <svg viewBox="0 0 24 24" stroke-width="0">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </span>
        <span class="txt">
          <span class="role">Healer</span>
          <div class="t">Guia do Healer</div>
          <div class="d">Build, posicionamento, kit e sobrevivência</div>
        </span>
        <span class="arrow">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </span>
      </a>
    </div>

    <footer>Wanted · guias da guild</footer>
  </div>
</body>
</html>
